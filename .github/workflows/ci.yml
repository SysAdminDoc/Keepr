name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust check + test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-14
            label: macOS
          - os: ubuntu-22.04
            label: Linux
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}
      # Linux WebKitGTK + GTK + AppIndicator stack is preinstalled on
      # macOS/Windows runners but not Ubuntu — must be apt-installed
      # before cargo check / test can compile against tauri 2.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            libclang-dev \
            cmake
      # v0.23.0 — whisper-rs needs libclang at build time (bindgen) and
      # a C++ toolchain to compile whisper.cpp from source. macOS has
      # Xcode CLT; Linux apt-installs above; Windows runner ships VS
      # BuildTools but LLVM isn't on PATH out of the box, so install +
      # point LIBCLANG_PATH at the bundled toolchain.
      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: echo "LIBCLANG_PATH=$LLVM_PATH/bin" >> $GITHUB_ENV
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --lib

  frontend:
    name: Frontend lint + test + build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-14
            label: macOS
          - os: ubuntu-22.04
            label: Linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
