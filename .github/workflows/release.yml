name: Release

# NF-V0.5-F + NF-V0.5-K — bundled-release pipeline. Fires on any tag
# matching v*.*.* and produces:
#   - Windows: NSIS installer + MSI + raw portable .zip (the only
#     officially-supported channel).
#   - macOS: .app bundle inside a .dmg, two arches (x86_64 + aarch64).
#   - Linux: .deb + .AppImage.
#
# Cross-platform builds are best-effort — Keepr is developed and
# QA'd on Windows; Mac/Linux artifacts are produced so the codebase
# stays buildable on those platforms (and so users can self-build),
# not as a support promise. See README for the "supported platform"
# wording.
#
# Trigger manually with `gh workflow run release.yml` for a dry-run on
# a non-tag commit (the resulting Release becomes a draft).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            rust-target: ""
            tauri-args: ""
          - os: macos-14
            label: macOS (Apple silicon)
            rust-target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin"
          - os: macos-13
            label: macOS (Intel)
            rust-target: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin"
          - os: ubuntu-22.04
            label: Linux (x86_64)
            rust-target: ""
            tauri-args: ""
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}-${{ matrix.rust-target }}

      # NF-V0.5-K — Linux runners need the WebKitGTK + ATK + libsoup
      # stack tauri-action assumes is preinstalled on macOS/Windows.
      # The packages also pull in librsvg2 (for the tray icon).
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            libclang-dev \
            cmake

      # v0.23.0 — whisper-rs requires libclang at build time (bindgen).
      # macOS has Xcode CLT; Linux apt-installs above; Windows runner
      # needs explicit LLVM install + LIBCLANG_PATH.
      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$LLVM_PATH/bin" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || 'v0.0.0-dev' }}
          releaseName: "Keepr ${{ github.ref_name || 'dev' }}"
          releaseBody: |
            Keepr ${{ github.ref_name || 'dev' }} — unsigned multi-platform build.

            **Windows (supported)** — `*.msi` (recommended), `*-setup.exe` (NSIS), `Keepr-portable.zip` (extract anywhere, drop `portable.flag` next to `keepr.exe` for USB-stick mode).

            **macOS (best-effort)** — `*.dmg` per arch. Unsigned + not notarized; macOS will refuse to open it until you right-click → Open → confirm, or run `xattr -d com.apple.quarantine /Applications/Keepr.app`.

            **Linux (best-effort)** — `*.deb` (Debian/Ubuntu) and `*.AppImage` (anywhere). Built against Ubuntu 22.04 / glibc 2.35.

            First-run SmartScreen warning is expected on Windows — click "More info → Run anyway" to install. See [SECURITY.md](https://github.com/SysAdminDoc/Keepr/blob/main/SECURITY.md) for why we ship unsigned today.

            Full release notes: [CHANGELOG.md](https://github.com/SysAdminDoc/Keepr/blob/main/CHANGELOG.md).
          releaseDraft: true
          prerelease: false
          # Bundle config in src-tauri/tauri.conf.json picks the right
          # targets per platform (NSIS+MSI on Windows, DMG on macOS,
          # deb+AppImage on Linux). --target adds the arch suffix on
          # the multi-arch macOS matrix entries.
          args: ${{ matrix.tauri-args }}

      # Windows-only — package the raw exe as a portable zip alongside
      # the bundles, since tauri-action only uploads the bundle targets.
      - name: Package Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/keepr.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "keepr.exe not found at $exe"
            exit 1
          }
          $stage = "stage-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe $stage
          # An empty `portable.flag` flips data-dir resolution into
          # next-to-EXE mode on first launch (lib.rs::resolve_data_dir).
          New-Item -ItemType File -Path "$stage/portable.flag" | Out-Null
          @"
          Keepr portable — extract this folder anywhere (USB stick, network share,
          Documents/Apps). Run keepr.exe. The presence of portable.flag tells the
          app to store keepr.db next to the exe instead of in %APPDATA%.

          To upgrade: replace keepr.exe with a newer build, keep portable.flag
          and keepr.db in place.
          "@ | Out-File -FilePath "$stage/README.txt" -Encoding utf8
          Compress-Archive -Path "$stage/*" -DestinationPath "Keepr-portable.zip" -Force

      - name: Attach Windows portable zip to release
        if: matrix.os == 'windows-latest' && github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} Keepr-portable.zip --clobber

      - name: Upload Windows portable zip as workflow artifact (dry runs)
        if: matrix.os == 'windows-latest' && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Keepr-portable
          path: Keepr-portable.zip
